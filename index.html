<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>臺北跨時空 WebAR 主畫面</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background: #e8d9b8;
      color: #2f281d;
    }

    body {
      overflow-y: auto;
      overflow-x: hidden;
    }

    body.scanning {
      overflow: hidden;
    }

    #arRoot {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: black;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    body.scanning #arRoot {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    a-scene {
      position: fixed !important;
      inset: 0;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1000;
    }

    body.scanning video,
    body.scanning canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
    }

    #app {
      min-height: 100vh;
      background-image: url("./background/bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: repeat-y;
      padding-bottom: 96px;
    }

    body.scanning #app {
      display: none;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 22px 22px 16px;
      background-image: url("./background/bg.png");
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid rgba(90, 70, 40, 0.18);
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.2;
    }

    .progress {
      margin-top: 10px;
      font-size: 18px;
      color: #6d5a38;
    }

    .icon-btn {
      font-size: 30px;
      color: #5a4a2c;
      padding-top: 4px;
    }

    .cards {
      padding: 22px 18px 20px;
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      margin-bottom: 22px;
      padding: 18px;
      border-radius: 14px;
      background-image: url("./background/bg.png");
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(90, 70, 40, 0.25);
      box-shadow: 0 5px 16px rgba(0,0,0,0.16);
    }

    .era {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .name-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .photo-name {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
    }

    .status {
      flex-shrink: 0;
      font-size: 17px;
      font-weight: 800;
      color: #8a6d24;
    }

    .status.pass {
      color: #3c8c3c;
    }

    .photo-wrap {
      position: relative;
      width: 100%;
    }

    .main-photo {
      width: 100%;
      height: auto;
      max-height: 280px;
      object-fit: contain;
      border-radius: 5px;
      border: 1px solid rgba(0,0,0,0.18);
      display: block;
      background: rgba(255,255,255,0.45);
    }

    .scan-frame-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 48%;
      height: 26%;
      min-height: 56px;
      border: 3px solid rgba(255,255,255,0.95);
      background: rgba(0,0,0,0.18);
      color: white;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.75);
      cursor: pointer;
      border-radius: 4px;
    }

    .scan-frame-btn.pass {
      background: rgba(60,140,60,0.55);
      border-color: rgba(255,255,255,0.95);
    }

    .message {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.50);
      color: white;
      text-align: center;
      font-size: 15px;
      line-height: 1.45;
    }

    .message.wrong {
      background: rgba(120, 40, 30, 0.72);
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 80;
      height: 78px;
      border-top: 1px solid rgba(90,70,40,0.18);
      display: flex;
      justify-content: space-around;
      align-items: center;
      color: #7a6846;
      background-image: url("./background/bg.png");
      background-size: cover;
      background-position: center;
    }

    .nav-item {
      text-align: center;
      font-size: 14px;
      line-height: 1.25;
    }

    .nav-icon {
      display: block;
      font-size: 24px;
      margin-bottom: 4px;
    }

    .active {
      color: #2f281d;
      font-weight: bold;
    }

    #scanOverlay {
      display: none;
      position: fixed;
      z-index: 3000;
      left: 14px;
      right: 14px;
      top: 14px;
      pointer-events: auto;
    }

    body.scanning #scanOverlay {
      display: block;
    }

    #scanMessage {
      background: rgba(0, 0, 0, 0.72);
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.45;
      text-align: center;
      margin-bottom: 10px;
    }

    #scanMessage.wrong {
      background: rgba(120, 40, 30, 0.78);
    }

    .scan-actions {
      display: flex;
      gap: 10px;
    }

    .scan-actions button {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: bold;
    }

    #submitAnswerBtn {
      background: rgba(255,255,255,0.95);
      color: #222;
    }

    #backScanBtn {
      background: rgba(40,40,40,0.82);
      color: white;
      border: 1px solid rgba(255,255,255,0.55);
    }

    .scan-corner {
      display: none;
      position: fixed;
      z-index: 1800;
      left: 50%;
      top: 52%;
      width: 72vw;
      max-width: 340px;
      height: 52vw;
      max-height: 260px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.95);
      border-radius: 6px;
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.08);
    }

    body.scanning .scan-corner {
      display: block;
    }

    @media (max-width: 420px) {
      .title {
        font-size: 28px;
      }

      .progress {
        font-size: 17px;
      }

      .cards {
        padding: 18px 14px 20px;
      }

      .card {
        padding: 16px;
      }

      .era {
        font-size: 22px;
      }

      .photo-name {
        font-size: 20px;
      }

      .status {
        font-size: 16px;
      }

      .main-photo {
        max-height: 240px;
      }
    }
  </style>
</head>

<body>

  <div id="arRoot">
    <a-scene
      id="arScene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0"></a-entity>
      <a-entity id="target1" mindar-image-target="targetIndex: 1"></a-entity>
      <a-entity id="target2" mindar-image-target="targetIndex: 2"></a-entity>
    </a-scene>
  </div>

  <div id="scanOverlay">
    <div id="scanMessage">正在啟動 AR 鏡頭，請允許相機權限。</div>
    <div class="scan-actions">
      <button id="submitAnswerBtn">送出答案</button>
      <button id="backScanBtn">回上一頁</button>
    </div>
  </div>

  <div class="scan-corner"></div>

  <div id="app">
    <div class="top-bar">
      <div class="title-row">
        <div>
          <div class="title">填滿年代表 ◎</div>
          <div class="progress" id="progressText">答題率：0%　已完成 0/3</div>
        </div>
        <div class="icon-btn">⌕</div>
      </div>
    </div>

    <div class="cards" id="cards"></div>

    <div class="bottom-nav">
      <div class="nav-item active">
        <span class="nav-icon">AR</span>
        照片掃描
      </div>
      <div class="nav-item">
        <span class="nav-icon">▦</span>
        填滿年代
      </div>
      <div class="nav-item">
        <span class="nav-icon">□</span>
        歷史故事
      </div>
      <div class="nav-item">
        <span class="nav-icon">⚙</span>
        問卷回饋
      </div>
    </div>
  </div>

  <script>
    const defaultImage = "./images/default.jpg";

    const questions = [
      {
        name: "臺北明治橋",
        era: "1930年代　約民國19年",
        image: "./images/q1.jpg"
      },
      {
        name: "西門町街景",
        era: "1960年代　約民國49年",
        image: "./images/q2.jpg"
      },
      {
        name: "臺北車站",
        era: "1980年代　約民國69年",
        image: "./images/q3.jpg"
      }
    ];

    let passed = [false, false, false];
    let currentScanIndex = null;
    let detectedIndex = null;
    let arRunning = false;
    let startingAR = false;

    const cards = document.getElementById("cards");
    const progressText = document.getElementById("progressText");
    const scanMessage = document.getElementById("scanMessage");
    const submitAnswerBtn = document.getElementById("submitAnswerBtn");
    const backScanBtn = document.getElementById("backScanBtn");
    const arScene = document.getElementById("arScene");

    function updateProgress() {
      const count = passed.filter(Boolean).length;
      const percent = Math.round((count / questions.length) * 100);
      progressText.innerText = `答題率：${percent}%　已完成 ${count}/${questions.length}`;
    }

    function renderCards() {
      cards.innerHTML = "";

      questions.forEach((q, index) => {
        const isPass = passed[index];
        const displayImage = isPass ? q.image : defaultImage;
        const buttonText = isPass ? "PASS" : "Go find";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="era">${q.era}</div>

          <div class="name-row">
            <div class="photo-name">${q.name}</div>
            <div class="status ${isPass ? "pass" : ""}" id="status-${index}">
              ${isPass ? "PASS" : "尚未辨識"}
            </div>
          </div>

          <div class="photo-wrap">
            <img class="main-photo" src="${displayImage}" alt="${isPass ? q.name : "尚未答題"}">
            <button class="scan-frame-btn ${isPass ? "pass" : ""}" data-index="${index}">
              ${buttonText}
            </button>
          </div>

          <div class="message" id="msg-${index}">
            ${isPass ? `已完成「${q.name}」` : `請按 Go find 後，尋找並掃描對應老照片。`}
          </div>
        `;

        cards.appendChild(card);
      });

      document.querySelectorAll(".scan-frame-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const index = Number(btn.dataset.index);
          if (passed[index]) return;
          startAR(index);
        });
      });

      updateProgress();
    }

    function getMindARSystem() {
      return arScene.systems && arScene.systems["mindar-image-system"];
    }

    function waitForMindARSystem(timeoutMs = 8000) {
      return new Promise((resolve, reject) => {
        const startTime = Date.now();

        const timer = setInterval(() => {
          const system = getMindARSystem();

          if (system) {
            clearInterval(timer);
            resolve(system);
            return;
          }

          if (Date.now() - startTime > timeoutMs) {
            clearInterval(timer);
            reject(new Error("MindAR system timeout"));
          }
        }, 100);
      });
    }

    async function startAR(index) {
      if (startingAR || arRunning) return;

      currentScanIndex = index;
      detectedIndex = null;
      startingAR = true;

      scanMessage.classList.remove("wrong");
      document.querySelectorAll(".message").forEach(el => el.classList.remove("wrong"));

      document.body.classList.add("scanning");
      scanMessage.innerText = `正在啟動 AR 鏡頭，請允許相機權限。`;

      try {
        if (!arScene.hasLoaded) {
          await new Promise(resolve => {
            arScene.addEventListener("loaded", resolve, { once: true });
          });
        }

        const mindarSystem = await waitForMindARSystem();

        await mindarSystem.start();

        arRunning = true;
        scanMessage.innerText = `請將白框對準你找到的老照片，辨識後按「送出答案」。`;
      } catch (err) {
        console.error(err);

        scanMessage.classList.add("wrong");
        scanMessage.innerText = "相機沒有成功開啟，請確認 Chrome 已允許相機，然後重新整理再試。";

        document.body.classList.remove("scanning");
      } finally {
        startingAR = false;
      }
    }

    async function stopAR() {
      try {
        const mindarSystem = getMindARSystem();

        if (mindarSystem && arRunning) {
          await mindarSystem.stop();
        }
      } catch (err) {
        console.warn(err);
      }

      arRunning = false;
      startingAR = false;
      document.body.classList.remove("scanning");
      scanMessage.classList.remove("wrong");
    }

    async function submitAnswer() {
      if (currentScanIndex === null) {
        await stopAR();
        return;
      }

      const targetIndex = currentScanIndex;

      if (detectedIndex === null) {
        await stopAR();

        const msg = document.getElementById(`msg-${targetIndex}`);
        if (msg) {
          msg.classList.remove("wrong");
          msg.innerText = "尚未掃描到照片，請再按 Go find 重新尋找。";
        }

        currentScanIndex = null;
        detectedIndex = null;
        return;
      }

      if (detectedIndex !== targetIndex) {
        scanMessage.classList.add("wrong");
        scanMessage.innerText = "可惜！不是這張，請再找找看。";
        detectedIndex = null;
        return;
      }

      passed[targetIndex] = true;

      await stopAR();

      currentScanIndex = null;
      detectedIndex = null;

      renderCards();

      const targetCard = document.querySelectorAll(".card")[targetIndex];
      if (targetCard) {
        targetCard.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    async function backToPage() {
      scanMessage.classList.remove("wrong");
      currentScanIndex = null;
      detectedIndex = null;
      await stopAR();
    }

    function bindTarget(targetId, index) {
      const target = document.getElementById(targetId);
      if (!target) return;

      target.addEventListener("targetFound", () => {
        detectedIndex = index;

        if (currentScanIndex === null) return;

        if (index === currentScanIndex) {
          scanMessage.classList.remove("wrong");
          scanMessage.innerText = `已掃描到「${questions[index].name}」，請按「送出答案」。`;
        } else {
          scanMessage.classList.add("wrong");
          scanMessage.innerText = "可惜！不是這張，請再找找看。";
        }
      });

      target.addEventListener("targetLost", () => {
        if (currentScanIndex !== null && detectedIndex === null) {
          scanMessage.classList.remove("wrong");
          scanMessage.innerText = "照片離開鏡頭，請重新對準白框。";
        }
      });
    }

    bindTarget("target0", 0);
    bindTarget("target1", 1);
    bindTarget("target2", 2);

    submitAnswerBtn.addEventListener("click", submitAnswer);
    backScanBtn.addEventListener("click", backToPage);

    renderCards();
  </script>

</body>
</html>
